name: Backfill Episode FAQs

on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run FAQ backfill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/backfill_episode_faqs.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: backfill/episode-faqs
          commit-message: "Backfill FAQ sections on existing episode articles"
          title: "Backfill FAQ sections on existing episode articles"
          body: |
            ## Auto-generated FAQ backfill

            Adds a visible FAQ section and matching `FAQPage` JSON-LD to
            every existing episode article that did not already have one.
            Questions and answers are grounded in each article's body and
            generated by the same tool contract as new episodes.

            Review each page before merging. Script is idempotent, so
            re-running will skip pages that already have FAQ schema.
          draft: false
